# Merge into existing VPS stack:
#   docker compose -f docker-compose.yml -f site/docker-compose.site.yml up -d
#
# Or run standalone from /paperclip/site/:
#   docker compose -f docker-compose.site.yml up -d

services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
      network: paperclip_default
      args:
        BRAND: ${BRAND:-}
        DIRECTUS_URL: ${DIRECTUS_URL:-http://vinomartino-directus-1:8055}
        DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-}
        CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
        CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
        BOOKING_AID: ${BOOKING_AID:-}
        GETYOURGUIDE_PARTNER: ${GETYOURGUIDE_PARTNER:-}
        WIJNVOORDEEL_TRACKING_ID: ${WIJNVOORDEEL_TRACKING_ID:-}
        SKYSCANNER_PARTNER: ${SKYSCANNER_PARTNER:-}
        REISVERZEKERING_PARTNER: ${REISVERZEKERING_PARTNER:-}
    image: paperclip-site:latest
    container_name: paperclip-site-1
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:4321"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./astro.config.mjs:/app/astro.config.mjs
    user: "node"
    mem_limit: 256m
    networks:
      - paperclip

networks:
  paperclip:
    external: true
    name: paperclip_default
