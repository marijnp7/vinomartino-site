# cos-exec-proxy — bespoke exec-allowlist voor de Docker API (LAT-2783)
#
# WAAROM NIET tecnativa/docker-socket-proxy:
#   In de tecnativa-ruleset valt `POST /containers/{id}/exec` onder de generieke
#   `^/containers`-ACL, die gated is door CONTAINERS — dezelfde vlag die ook
#   `POST /containers/create` en `POST /containers/{id}/start` doorlaat. Exec
#   toestaan betekent daar dus onvermijdelijk ook `docker run --privileged`
#   toestaan. Bewezen in LAT-2783: via zo'n proxy is een privileged container
#   met `/:/host` aangemaakt, gestart, en host-/etc/shadow uitgelezen.
#
# WAT DEZE CONFIG DOET:
#   Allowlist op exact pad-niveau. Alleen exec op één container
#   (paperclip-cos-1) plus het starten van die exec-sessie. Al het overige —
#   create, start, images, volumes, networks, exec op andere containers — 403.
#
# Exec-IDs in /exec/<id>/... zijn uitsluitend te verkrijgen via de exec-create
# hierboven, die op paperclip-cos-1 gepind is. Het breed toestaan van
# /exec/<hex>/start lekt daarom geen toegang tot andere containers.

global
    log stdout format raw daemon info
    pidfile /run/haproxy.pid
    maxconn 4000

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option redispatch
    retries 3
    timeout http-request 10s
    timeout queue 1m
    timeout connect 10s
    # Ruim bemeten: een `claude -p`-aanroep via docker exec kan minuten duren.
    # `timeout tunnel` geldt voor de gehijackte exec-stream (docker exec -i).
    timeout client 30m
    timeout server 30m
    timeout tunnel 30m
    timeout http-keep-alive 10s
    timeout check 10s
    maxconn 3000

backend dockerbackend
    server dockersocket /var/run/docker.sock

frontend dockerfrontend
    bind [::]:2375 v4v6

    # --- API-versienegotiatie: de docker CLI pingt bij elke aanroep ---
    http-request allow if METH_GET { path,url_dec -m reg -i ^(/v[\d\.]+)?/_ping$ }
    http-request allow if METH_HEAD { path,url_dec -m reg -i ^(/v[\d\.]+)?/_ping$ }
    http-request allow if METH_GET { path,url_dec -m reg -i ^(/v[\d\.]+)?/version$ }

    # --- inspect van uitsluitend de doelcontainer (CLI checkt state vóór exec) ---
    http-request allow if METH_GET { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers/paperclip-cos-1/json$ }

    # --- exec-create: ALLEEN op paperclip-cos-1 ---
    http-request allow if METH_POST { path,url_dec -m reg -i ^(/v[\d\.]+)?/containers/paperclip-cos-1/exec$ }

    # --- exec-sessie besturen (ids komen alleen uit de call hierboven) ---
    http-request allow if METH_POST { path,url_dec -m reg -i ^(/v[\d\.]+)?/exec/[a-f0-9]+/(start|resize)$ }
    http-request allow if METH_GET { path,url_dec -m reg -i ^(/v[\d\.]+)?/exec/[a-f0-9]+/json$ }

    # --- default deny: create, start, build, images, volumes, networks, exec elders ---
    http-request deny

    default_backend dockerbackend
