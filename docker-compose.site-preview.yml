services:
  site-preview:
    build:
      context: /paperclip/site
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3101:3101"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3101/"]
      interval: 30s
      timeout: 5s
      retries: 3
