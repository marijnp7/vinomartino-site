# Directus CMS + PostgreSQL for the travel platform
# Usage: docker compose -f docker-compose.directus.yml up -d
# Then run: npm run directus:setup

services:
  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - "127.0.0.1:8055:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
      - ./directus/scripts:/directus/scripts
    depends_on:
      directus-db:
        condition: service_healthy
    environment:
      DB_CLIENT: pg
      DB_HOST: directus-db
      DB_PORT: 5432
      DB_DATABASE: ${DIRECTUS_DB_NAME:-directus}
      DB_USER: ${DIRECTUS_DB_USER:-directus}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD:-directus_secret}
      SECRET: ${DIRECTUS_SECRET:-change-me-to-a-random-string}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@reisplatform.nl}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-admin_secret}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "*"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.directus.rule=Host(`cms.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.directus.entrypoints=websecure"
      - "traefik.http.routers.directus.tls.certresolver=letsencrypt"
      - "traefik.http.services.directus.loadbalancer.server.port=8055"
    networks:
      - internal

  directus-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - directus_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DIRECTUS_DB_NAME:-directus}
      POSTGRES_USER: ${DIRECTUS_DB_USER:-directus}
      POSTGRES_PASSWORD: ${DIRECTUS_DB_PASSWORD:-directus_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DIRECTUS_DB_USER:-directus}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  directus_pgdata:
  directus_uploads:
  directus_extensions:

networks:
  internal:
    driver: bridge
