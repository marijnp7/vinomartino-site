services:
  vinomartino-preview:
    image: nginx:alpine
    container_name: paperclip-vinomartino-preview-1
    restart: unless-stopped
    ports:
      - "0.0.0.0:8090:80"
    volumes:
      - ./preview-dist:/usr/share/nginx/html:ro
      - ./nginx-preview.conf:/etc/nginx/conf.d/default.conf:ro
      - ./htpasswd:/etc/nginx/.htpasswd:ro
    mem_limit: 128m
