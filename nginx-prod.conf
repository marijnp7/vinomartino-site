server {
    listen 80;
    server_name vinomartino.com www.vinomartino.com;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

        # LAT-799 (2026-05-03): legacy multi-brand path — single-brand mode locked in src/lib/brands.ts
        # Catches bookmarks / Google index entries from pre-LAT-7 era. Permanent 301 to /.
        location ~ ^/vinomartino(/.*)?$ {
                return 301 /$is_args$args;
    }
        location ~ ^/nl(/.*)?$ {
                return 301 /$is_args$args;
    }
    
    location / {
        try_files $uri $uri/ =404;
    }
}
