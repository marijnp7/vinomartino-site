# LAT-1026: per-IP rate-limit zone for /api/clicks/*. 10 req/min, 10MB shared (~160k IPs).
limit_req_zone $binary_remote_addr zone=clicks:10m rate=10r/m;

# LAT-2446: browsers cachen een 301 zonder Cache-Control heuristisch als permanent.
# Een ooit-opgevangen foute 301 (transiente bad-deploy / oude CF-rule / LAT-1103 http-301)
# blijft dan eeuwig plakken in de client — onzichtbaar voor curl en verse browsers. Markeer
# daarom ALLE 3xx (incl. nginx's auto trailing-slash 301 uit try_files $uri/) als niet-cachebaar.
# Lege waarde => nginx laat de Cache-Control header weg voor niet-3xx responses.
map $status $redirect_cache_control {
    ~^3     "no-store";
    default "";
}

server {
    listen 80;
    server_name vinomartino.com www.vinomartino.com;
    root /usr/share/nginx/html;
    index index.html;

    # LAT-1103: nginx's auto trailing-slash 301 (van try_files $uri/) bouwt
    # Location met $scheme://$host$uri/. Achter CF is de origin-TCP-leg HTTP,
    # dus $scheme=http en de Location wordt http://... ondanks https inbound.
    # absolute_redirect off → relatieve Location (/path/), browser/crawler
    # houdt eigen scheme aan. Geen HTTPS→HTTP-leg meer in canonical chain.
    absolute_redirect off;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    # LAT-2446: zie map hierboven — no-store op elke 3xx redirect (trailing-slash
    # normalisatie + expliciete return 301's). Voorkomt dat een client een permanente
    # bad-redirect voor deze paden vastzet. always => ook toegevoegd op 3xx/4xx/5xx.
    add_header Cache-Control $redirect_cache_control always;

    error_page 404 /404.html;

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # LAT-1026: public click sink for M-data baseline (LAT-1019).
    # POST-only proxy to Directus collection affiliate_clicks (public role = create-only).
    # `resolver` + variable in proxy_pass: defers DNS to request time so `nginx -t` passes before
    # this container is attached to directus_directus_net (deploy.yml lints before compose recreate).
    location = /api/clicks/affiliate {
        limit_req zone=clicks burst=10 nodelay;
        if ($request_method != POST) { return 405; }
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $directus_target http://vinomartino-directus-1:8055/items/affiliate_clicks;
        proxy_pass $directus_target;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LAT-1026: /intern/ basic-auth (M-data mini-dashboard host, LAT-1019).
    location /intern/ {
        auth_basic "VinoMartino intern";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ =404;
    }

        # LAT-799 (2026-05-03): legacy multi-brand path — single-brand mode locked in src/lib/brands.ts
        # Catches bookmarks / Google index entries from pre-LAT-7 era. Permanent 301 to /.
        location ~ ^/vinomartino(/.*)?$ {
                return 301 /$is_args$args;
    }
        location ~ ^/nl(/.*)?$ {
                return 301 /$is_args$args;
    }

        # /bestemmingen — pre-LAT-799 legacy. /landen/* is now an active content type, do NOT redirect it.
        location ~ ^/bestemmingen(/.*)?$ {
                return 301 /$is_args$args;
    }

        # LAT-859 (2026-05-05): /routes/* is non-canonical duplicate of /wijnroutes/*
        # Strategy canonical: /wijnroutes/ — permanent redirect preserving slug.
        location ~ ^/routes(/.*)?$ {
                return 301 /wijnroutes$1;
    }

        # LAT-859 (2026-05-05): streken fallback slugs superseded by Directus canonical entries
        location = /streken/douro/ {
                return 301 /streken/douro-portugal/;
    }
        location = /streken/mosel/ {
                return 301 /streken/mosel-duitsland/;
        }
        # LAT-1888: barbaresco/barolo hadden nooit eigen streekpagina; Langhe dekt beide
        location = /streken/barbaresco-piemonte/ {
                return 301 /streken/langhe-piemonte/;
        }
        location = /streken/barolo-piemonte/ {
                return 301 /streken/langhe-piemonte/;
    }

        # LAT-1853 (2026-07-14): Piemonte keyword-cannibalisatie — near-duplicate artikelen 301 naar canoniek.
        # Board-approval 4d2eee89 + Marijn Pillar+Cluster-mandaat. Patroon LAT-859/LAT-1852/LAT-1888.
        # Render-laag heeft geen per-artikel canonical/noindex-veld -> 301 verwijdert de duplicaat-URL.
        location = /artikelen/een-week-in-piemonte-barolo-barbaresco-en-alles-daartussenin/ {
                return 301 /artikelen/een-week-in-piemonte/;
        }
        location = /artikelen/langhe-vier-dagen-route/ {
                return 301 /artikelen/langhe-piemonte-4-dagen-route/;
        }

    location / {
        try_files $uri $uri/ =404;
    }
}
