# Deploy CoS bridge to VPS (LAT-781)
#
# Syncs the cos-bridge source (services/cos-bridge/) to /opt/paperclip-cos/
# on the VPS, then rebuilds the cos-bridge container.
#
# Triggers:
#   - push to preview when services/cos-bridge/** changes
#   - manual workflow_dispatch
#
# Vereiste secrets: VPS_HOST, VPS_USER, VPS_SSH_PRIVATE_KEY

name: Deploy CoS Bridge

on:
  push:
    branches: [preview]
    paths:
      - 'services/cos-bridge/**'
      - '.github/workflows/deploy-cos.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-cos-bridge
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host $VPS_HOST
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          ssh-keyscan "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync bridge code to VPS
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        run: |
          ssh "$VPS" "mkdir -p /opt/paperclip-cos/bridge/src /opt/paperclip-cos/exec-proxy"

          rsync -avz --delete \
            services/cos-bridge/bridge/ \
            "$VPS:/opt/paperclip-cos/bridge/"

          rsync -avz \
            services/cos-bridge/Dockerfile.bridge \
            "$VPS:/opt/paperclip-cos/Dockerfile.bridge"

          # LAT-2783: allowlist-config voor cos-exec-proxy. Zonder deze sync
          # start de proxy met een lege/oude config en valt de hardening stil weg.
          rsync -avz --delete \
            services/cos-bridge/exec-proxy/ \
            "$VPS:/opt/paperclip-cos/exec-proxy/"

          rsync -avz \
            services/cos-bridge/docker-compose.cos.yml \
            "$VPS:/opt/paperclip-cos/docker-compose.cos.yml"

      - name: Add missing env vars
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          SETUP_SCRIPT: |
            set -euo pipefail
            ENV_FILE="/opt/paperclip-cos/.env.cos"

            if [ ! -f "$ENV_FILE" ]; then
              echo "::error::.env.cos not found at $ENV_FILE"
              exit 1
            fi

            add_if_missing() {
              local key="$1" val="$2"
              if ! grep -q "^${key}=" "$ENV_FILE"; then
                echo "${key}=${val}" >> "$ENV_FILE"
                echo "Added $key"
              else
                echo "$key already set"
              fi
            }

            add_if_missing "PAPERCLIP_API_URL" "http://paperclip:3100"
            add_if_missing "PAPERCLIP_COMPANY_ID" "043c137d-f917-48ed-8268-62641a891212"

            # Docker --env-file passes values verbatim (no inline comment stripping).
            # Strip trailing " # ..." from env values to prevent auth failures.
            sed -i -E 's/^([A-Z_]+=[^ #]+)\s+#.*$/\1/' "$ENV_FILE"
            echo "Sanitized inline comments from env values"
        run: |
          printf '%s\n' "$SETUP_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Diagnose VPS state
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          DIAG_SCRIPT: |
            set -euo pipefail
            echo "=== /opt/paperclip-cos/ contents ==="
            ls -la /opt/paperclip-cos/ || echo "Directory not found"
            echo ""
            echo "=== bridge/ contents ==="
            ls -la /opt/paperclip-cos/bridge/src/ 2>/dev/null || echo "bridge/src not found"
            echo ""
            echo "=== Docker version ==="
            docker --version || echo "docker not found"
            docker compose version 2>/dev/null || docker-compose --version 2>/dev/null || echo "compose not found"
            echo ""
            echo "=== Existing cos containers ==="
            docker ps -a --filter "name=cos" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" 2>/dev/null || true
            echo ""
            echo "=== Docker networks ==="
            docker network ls --filter "name=paperclip" --format "table {{.Name}}\t{{.Driver}}" 2>/dev/null || true
        run: |
          printf '%s\n' "$DIAG_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Rebuild cos-bridge container
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          REBUILD_SCRIPT: |
            set -euo pipefail
            cd /opt/paperclip-cos

            echo "=== Ensuring paperclip network exists ==="
            docker network inspect paperclip_default >/dev/null 2>&1 \
              || docker network create paperclip_default 2>&1

            echo "=== Force-recreating cos-bridge (picks up env changes) ==="
            docker compose -f docker-compose.cos.yml up -d --build --force-recreate cos-bridge 2>&1

            echo "Waiting 10s for container startup..."
            sleep 10

            echo "=== Container status ==="
            docker ps -a --filter "name=paperclip-cos-bridge-1" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" 2>&1

            echo "=== Recent logs ==="
            docker logs --tail=50 paperclip-cos-bridge-1 2>&1 || true
        run: |
          printf '%s\n' "$REBUILD_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Health check
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        run: |
          for attempt in 1 2 3 4 5; do
            status=$(ssh "$VPS" "curl -sS -o /dev/null -w '%{http_code}' http://localhost:3200/health" || echo "000")
            echo "Attempt $attempt: health check → HTTP $status"
            if [ "$status" = "200" ]; then
              echo "::notice::CoS bridge is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Health check did not return 200 after 5 attempts"

      # LAT-2783 / LAT-1005: harde gate op de hardening.
      # De LAT-1005-hardening is ooit handmatig op de VPS gezet, heeft de repo
      # nooit gehaald, en is stilletjes door een deploy overschreven — zonder
      # signaal, want de container bleef gezond. Deze stap laat de deploy falen
      # zodra de rauwe socket of root terugkomt, zodat dat faalpad dicht is.
      - name: Verify hardening (LAT-2783)
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          VERIFY_SCRIPT: |
            set -euo pipefail
            fail=0

            echo "=== 1. geen rauwe docker.sock-mount op cos-bridge ==="
            if docker inspect paperclip-cos-bridge-1 \
                 --format '{{range .Mounts}}{{.Source}}{{"\n"}}{{end}}' \
                 | grep -q '^/var/run/docker.sock$'; then
              echo "::error::REGRESSIE — cos-bridge heeft weer een rauwe docker.sock-mount"
              fail=1
            else
              echo "OK — geen socket-mount"
            fi

            echo "=== 2. cos-bridge draait niet als root ==="
            u=$(docker inspect paperclip-cos-bridge-1 --format '{{.Config.User}}')
            if [ "$u" = "root" ] || [ "$u" = "0" ] || [ "$u" = "0:0" ]; then
              echo "::error::REGRESSIE — cos-bridge draait als root ($u)"
              fail=1
            else
              echo "OK — user='$u'"
            fi

            echo "=== 3. container-create via de proxy wordt geweigerd (403) ==="
            if docker exec paperclip-cos-bridge-1 sh -c \
                 "wget -q -S -O /dev/null --post-data='{}' \
                    --header='Content-Type: application/json' \
                    http://cos-exec-proxy:2375/v1.43/containers/create 2>&1 \
                  | grep -q ' 403 '"; then
              echo "OK — create geblokkeerd (403)"
            else
              echo "::error::LEK — /containers/create is NIET geblokkeerd op cos-exec-proxy"
              fail=1
            fi

            echo "=== 4. CoS-flow intact: exec naar paperclip-cos-1 werkt nog ==="
            if docker exec paperclip-cos-bridge-1 \
                 docker exec -u node paperclip-cos-1 cat /cos/system-prompt.md \
                 | head -c 100 | grep -q .; then
              echo "OK — exec naar cos-1 werkt"
            else
              echo "::error::KAPOT — exec naar paperclip-cos-1 werkt niet meer"
              fail=1
            fi

            exit $fail
        run: |
          printf '%s\n' "$VERIFY_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Done
        run: echo "::notice::CoS bridge deployed successfully"
