# Deploy CoS bridge to VPS (LAT-781)
#
# Syncs the cos-bridge source (services/cos-bridge/) to /opt/paperclip-cos/
# on the VPS, then rebuilds the cos-bridge container.
#
# Triggers:
#   - push to preview when services/cos-bridge/** changes
#   - manual workflow_dispatch
#
# Vereiste secrets: VPS_HOST, VPS_USER, VPS_SSH_PRIVATE_KEY

name: Deploy CoS Bridge

on:
  push:
    branches: [preview]
    paths:
      - 'services/cos-bridge/**'
      - '.github/workflows/deploy-cos.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-cos-bridge
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host $VPS_HOST
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          ssh-keyscan "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync bridge code to VPS
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        run: |
          ssh "$VPS" "mkdir -p /opt/paperclip-cos/bridge/src"

          rsync -avz --delete \
            services/cos-bridge/bridge/ \
            "$VPS:/opt/paperclip-cos/bridge/"

          rsync -avz \
            services/cos-bridge/Dockerfile.bridge \
            "$VPS:/opt/paperclip-cos/Dockerfile.bridge"

      - name: Add missing env vars
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          SETUP_SCRIPT: |
            set -euo pipefail
            ENV_FILE="/opt/paperclip-cos/.env.cos"

            if [ ! -f "$ENV_FILE" ]; then
              echo "::error::.env.cos not found at $ENV_FILE"
              exit 1
            fi

            add_if_missing() {
              local key="$1" val="$2"
              if ! grep -q "^${key}=" "$ENV_FILE"; then
                echo "${key}=${val}" >> "$ENV_FILE"
                echo "Added $key"
              else
                echo "$key already set"
              fi
            }

            add_if_missing "PAPERCLIP_API_URL" "http://paperclip:3100"
            add_if_missing "PAPERCLIP_COMPANY_ID" "043c137d-f917-48ed-8268-62641a891212"

            # Docker --env-file passes values verbatim (no inline comment stripping).
            # Strip trailing " # ..." from env values to prevent auth failures.
            sed -i -E 's/^([A-Z_]+=[^ #]+)\s+#.*$/\1/' "$ENV_FILE"
            echo "Sanitized inline comments from env values"
        run: |
          printf '%s\n' "$SETUP_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Diagnose VPS state
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          DIAG_SCRIPT: |
            set -euo pipefail
            echo "=== /opt/paperclip-cos/ contents ==="
            ls -la /opt/paperclip-cos/ || echo "Directory not found"
            echo ""
            echo "=== bridge/ contents ==="
            ls -la /opt/paperclip-cos/bridge/src/ 2>/dev/null || echo "bridge/src not found"
            echo ""
            echo "=== Docker version ==="
            docker --version || echo "docker not found"
            docker compose version 2>/dev/null || docker-compose --version 2>/dev/null || echo "compose not found"
            echo ""
            echo "=== Existing cos containers ==="
            docker ps -a --filter "name=cos" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" 2>/dev/null || true
            echo ""
            echo "=== Docker networks ==="
            docker network ls --filter "name=paperclip" --format "table {{.Name}}\t{{.Driver}}" 2>/dev/null || true
        run: |
          printf '%s\n' "$DIAG_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Rebuild cos-bridge container
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          REBUILD_SCRIPT: |
            set -euo pipefail
            cd /opt/paperclip-cos

            # Bypass docker-compose (may fail parsing multi-service yml if cos
            # service Dockerfile is absent). Use raw docker build + run instead.

            echo "=== Building cos-bridge image ==="
            docker build -t paperclip-cos-bridge:latest -f Dockerfile.bridge . 2>&1

            echo "=== Stopping old container ==="
            docker stop paperclip-cos-bridge-1 2>/dev/null || true
            docker rm paperclip-cos-bridge-1 2>/dev/null || true

            echo "=== Ensuring paperclip network exists ==="
            docker network inspect paperclip_default >/dev/null 2>&1 \
              || docker network create paperclip_default 2>&1

            echo "=== Starting cos-bridge container ==="
            docker run -d \
              --name paperclip-cos-bridge-1 \
              --restart unless-stopped \
              --user root \
              --env-file .env.cos \
              -v /var/run/docker.sock:/var/run/docker.sock \
              --network paperclip_default \
              --health-cmd "wget -qO- http://127.0.0.1:3200/health || exit 1" \
              --health-interval 30s \
              --health-timeout 5s \
              --health-retries 3 \
              paperclip-cos-bridge:latest 2>&1

            echo "Waiting 10s for container startup..."
            sleep 10

            echo "=== Container status ==="
            docker ps -a --filter "name=paperclip-cos-bridge-1" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" 2>&1

            echo "=== Recent logs ==="
            docker logs --tail=50 paperclip-cos-bridge-1 2>&1 || true
        run: |
          printf '%s\n' "$REBUILD_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Health check
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        run: |
          for attempt in 1 2 3 4 5; do
            status=$(ssh "$VPS" "curl -sS -o /dev/null -w '%{http_code}' http://localhost:3200/health" || echo "000")
            echo "Attempt $attempt: health check → HTTP $status"
            if [ "$status" = "200" ]; then
              echo "::notice::CoS bridge is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Health check did not return 200 after 5 attempts"

      - name: Done
        run: echo "::notice::CoS bridge deployed successfully"
