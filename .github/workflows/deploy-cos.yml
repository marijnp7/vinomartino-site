# Deploy CoS bridge to VPS (LAT-781)
#
# Syncs the cos-bridge source (services/cos-bridge/) to /opt/paperclip-cos/
# on the VPS, then rebuilds the cos-bridge container.
#
# Triggers:
#   - push to preview when services/cos-bridge/** changes
#   - manual workflow_dispatch
#
# Vereiste secrets: VPS_HOST, VPS_USER, VPS_SSH_PRIVATE_KEY

name: Deploy CoS Bridge

on:
  push:
    branches: [preview]
    paths:
      - 'services/cos-bridge/**'
      - '.github/workflows/deploy-cos.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-cos-bridge
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host $VPS_HOST
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          ssh-keyscan "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync bridge code to VPS
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        run: |
          ssh "$VPS" "mkdir -p /opt/paperclip-cos/bridge/src"

          rsync -avz --delete \
            services/cos-bridge/bridge/ \
            "$VPS:/opt/paperclip-cos/bridge/"

          rsync -avz \
            services/cos-bridge/Dockerfile.bridge \
            "$VPS:/opt/paperclip-cos/Dockerfile.bridge"

          rsync -avz \
            services/cos-bridge/docker-compose.cos.yml \
            "$VPS:/opt/paperclip-cos/docker-compose.cos.yml"

          # LAT-2811: COMPOSE_PROJECT_NAME + COMPOSE_FILE, zodat een kale
          # `docker compose` in /opt/paperclip-cos alle 8 services van het
          # project laadt in plaats van alleen deze file. Bron in de repo,
          # artefact op de VPS — net als docker-compose.cos.yml hierboven.
          rsync -avz \
            services/cos-bridge/compose.env \
            "$VPS:/opt/paperclip-cos/.env"

      - name: Verify merged compose config (LAT-2811)
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          VERIFY_SCRIPT: |
            set -uo pipefail
            cd /opt/paperclip-cos

            # Harde check: de file die deze workflow zojuist heeft neergezet
            # moet geldig zijn. Zo niet, dan is deployen zinloos.
            if ! docker compose -f docker-compose.cos.yml config -q; then
              echo "::error::docker-compose.cos.yml is invalid — deploy afgebroken"
              exit 1
            fi

            # Zachte check: de merged config (COMPOSE_FILE uit .env) moet alle
            # draaiende containers van dit project dekken. Faalt bewust NIET
            # hard — een kapotte overlay mag de deploy van cos-bridge (het
            # approval-kanaal) niet blokkeren. Wel luid zichtbaar, want zolang
            # dit rood is staat de --remove-orphans-val van LAT-2811 weer open.
            if ! docker compose config -q 2>/tmp/lat2811-config.err; then
              echo "::warning::merged compose config is invalid — orphan-vangnet staat open"
              cat /tmp/lat2811-config.err
              exit 0
            fi

            defined=$(docker compose config --services | sort)
            running=$(docker ps -a \
              --filter "label=com.docker.compose.project=paperclip-cos" \
              --format '{{.Label "com.docker.compose.service"}}' | sort -u)

            orphans=$(comm -13 <(printf '%s\n' "$defined") <(printf '%s\n' "$running"))
            if [ -n "$orphans" ]; then
              echo "::warning::draaiende containers zonder service-definitie (orphans):"
              printf '%s\n' "$orphans"
              echo "Voeg ze toe aan docker-compose.cos.yml of aan COMPOSE_FILE in compose.env."
            else
              echo "OK: alle draaiende containers van paperclip-cos zijn gedefinieerd."
            fi
        run: |
          printf '%s\n' "$VERIFY_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Add missing env vars
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          SETUP_SCRIPT: |
            set -euo pipefail
            ENV_FILE="/opt/paperclip-cos/.env.cos"

            if [ ! -f "$ENV_FILE" ]; then
              echo "::error::.env.cos not found at $ENV_FILE"
              exit 1
            fi

            add_if_missing() {
              local key="$1" val="$2"
              if ! grep -q "^${key}=" "$ENV_FILE"; then
                echo "${key}=${val}" >> "$ENV_FILE"
                echo "Added $key"
              else
                echo "$key already set"
              fi
            }

            add_if_missing "PAPERCLIP_API_URL" "http://paperclip:3100"
            add_if_missing "PAPERCLIP_COMPANY_ID" "043c137d-f917-48ed-8268-62641a891212"

            # Docker --env-file passes values verbatim (no inline comment stripping).
            # Strip trailing " # ..." from env values to prevent auth failures.
            sed -i -E 's/^([A-Z_]+=[^ #]+)\s+#.*$/\1/' "$ENV_FILE"
            echo "Sanitized inline comments from env values"
        run: |
          printf '%s\n' "$SETUP_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Diagnose VPS state
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          DIAG_SCRIPT: |
            set -euo pipefail
            echo "=== /opt/paperclip-cos/ contents ==="
            ls -la /opt/paperclip-cos/ || echo "Directory not found"
            echo ""
            echo "=== bridge/ contents ==="
            ls -la /opt/paperclip-cos/bridge/src/ 2>/dev/null || echo "bridge/src not found"
            echo ""
            echo "=== Docker version ==="
            docker --version || echo "docker not found"
            docker compose version 2>/dev/null || docker-compose --version 2>/dev/null || echo "compose not found"
            echo ""
            echo "=== Existing cos containers ==="
            docker ps -a --filter "name=cos" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" 2>/dev/null || true
            echo ""
            echo "=== Docker networks ==="
            docker network ls --filter "name=paperclip" --format "table {{.Name}}\t{{.Driver}}" 2>/dev/null || true
        run: |
          printf '%s\n' "$DIAG_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Rebuild cos-bridge container
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          REBUILD_SCRIPT: |
            set -euo pipefail
            cd /opt/paperclip-cos

            echo "=== Ensuring paperclip network exists ==="
            docker network inspect paperclip_default >/dev/null 2>&1 \
              || docker network create paperclip_default 2>&1

            echo "=== Force-recreating cos-bridge (picks up env changes) ==="
            # LAT-2811: bewust een expliciete -f-subset, in tegenstelling tot de
            # runbook-regel (docs/runbooks/cos-stack-deploy.md), die een kale
            # `docker compose` voorschrijft. Reden: deze stap moet ook slagen als
            # een overlay stuk is — cos-bridge is het approval-kanaal en mag niet
            # afhangen van publish-dispatcher of de nl-redirect. Het is hier
            # veilig omdat de aanroep op één service is gescoped en er geen
            # --remove-orphans in staat; een -f-subset is alleen gevaarlijk in
            # combinatie met die vlag. De orphan-dekking wordt in de stap
            # "Verify merged compose config" apart bewaakt.
            docker compose -f docker-compose.cos.yml up -d --build --force-recreate cos-bridge 2>&1

            echo "Waiting 10s for container startup..."
            sleep 10

            echo "=== Container status ==="
            docker ps -a --filter "name=paperclip-cos-bridge-1" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" 2>&1

            echo "=== Recent logs ==="
            docker logs --tail=50 paperclip-cos-bridge-1 2>&1 || true
        run: |
          printf '%s\n' "$REBUILD_SCRIPT" | ssh "$VPS" "bash -s"

      - name: Health check
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        run: |
          for attempt in 1 2 3 4 5; do
            status=$(ssh "$VPS" "curl -sS -o /dev/null -w '%{http_code}' http://localhost:3200/health" || echo "000")
            echo "Attempt $attempt: health check → HTTP $status"
            if [ "$status" = "200" ]; then
              echo "::notice::CoS bridge is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "::warning::Health check did not return 200 after 5 attempts"

      - name: Done
        run: echo "::notice::CoS bridge deployed successfully"
