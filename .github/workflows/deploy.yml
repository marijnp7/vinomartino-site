# LAT-89 — auto-deploy pipeline voor vinomartino-site
#
# Architectuur: VPS-side build.
#   1. GHA checkt code uit
#   2. GHA rsynct src (zonder node_modules/dist) naar /srv/vino-builds/<run_id>/
#   3. VPS bouwt daar (npm ci + npm run build) — heeft direct toegang tot
#      Directus binnen het Docker-netwerk, geen CF Access secrets in GHA nodig
#   4. Atomic swap: nieuwe dist/ wordt verplaatst naar definitieve locatie,
#      oude wordt bewaard als .old-<ts> (laatste 3 als rollback)
#   5. nginx reload in de juiste container
#
# Branches:
#   • preview → /root/vinomartino-site/preview-dist (paperclip-vinomartino-preview-1)
#   • main    → /root/vinomartino-site/dist          (paperclip-vinomartino-prod-1)
#             → eerst Telegram-approval via Paperclip CoS bridge
#
# Vereiste secrets (slechts 3):
#   VPS_HOST, VPS_USER, VPS_SSH_PRIVATE_KEY
#
# Optioneel:
#   COS_APPROVAL_URL  (default: https://approval.vinomartino.com/approval)

name: Deploy VinoMartino

on:
  push:
    branches: [preview, main]
  workflow_dispatch:
    inputs:
      target:
        description: "Doel (preview of production)"
        required: true
        default: preview
        type: choice
        options: [preview, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://vinomartino.com' || 'https://preview.vinomartino.com' }}

    steps:
      # ── 1. Bepaal doel-omgeving ──────────────────────────────────────────
      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.target }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            target="production"
          else
            target="preview"
          fi

          if [ "$target" = "production" ]; then
            dist_dir="/root/vinomartino-site/dist"
            container="paperclip-vinomartino-prod-1"
          else
            dist_dir="/root/vinomartino-site/preview-dist"
            container="paperclip-vinomartino-preview-1"
          fi

          echo "target=$target"       >> "$GITHUB_OUTPUT"
          echo "dist_dir=$dist_dir"   >> "$GITHUB_OUTPUT"
          echo "container=$container" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploying to $target → $dist_dir ($container)"

      # ── 2. Code ophalen ───────────────────────────────────────────────────
      # NB: productie-approval gebeurt VOOR deze stap door de GHA
      # environment-gate ("production" environment heeft required reviewers).
      # Preview-pushes hebben geen reviewers en lopen direct door.
      - name: Checkout
        uses: actions/checkout@v4

      # ── 4. SSH-key in agent ──────────────────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host $VPS_HOST
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          # Best-effort host-key prefetch; non-fataal als netwerk flakey is
          ssh-keyscan "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      # ── 5. Sync src naar VPS staging ─────────────────────────────────────
      - name: Sync source to VPS staging
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          STAGE: /srv/vino-builds/${{ github.run_id }}
        run: |
          ssh "$VPS" "mkdir -p '$STAGE'"
          rsync -avz --delete \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=preview-dist \
            --exclude=.git \
            --exclude='*.old-*' \
            --exclude='deploy-key-github-actions*' \
            ./ "$VPS:$STAGE/"

      # ── 6. Build op VPS ──────────────────────────────────────────────────
      #
      # We kopiëren .env uit de bestaande site-folder zodat DIRECTUS_URL en
      # DIRECTUS_TOKEN beschikbaar zijn tijdens de build. Geen secrets nodig
      # in GHA — Directus zit achter CF Access en is alleen vanaf de VPS
      # bereikbaar via het Docker-netwerk. Script wordt via stdin verstuurd
      # zodat we geen bash heredoc binnen YAML hoeven te jongleren.
      - name: Build on VPS
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          STAGE: /srv/vino-builds/${{ github.run_id }}
          GIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          BUILD_SCRIPT: |
            set -euo pipefail
            cd "$STAGE"
            if [ -f /root/vinomartino-site/.env ]; then
              cp /root/vinomartino-site/.env .env
            fi
            # Build altijd in docker met --network directus_directus_net,
            # anders kan de host de container-DNS `vinomartino-directus-1`
            # niet resolven en valt de build silently terug op lokale
            # markdown-bestanden zonder hero_image (LAT-896 follow-up).
            docker run --rm --network directus_directus_net \
              -v "$STAGE":/app -w /app \
              node:24 bash -c "npm ci && npm run build"
            # LAT-910: write build-fingerprint into dist/ so smoke-test
            # downstream can verify served bytes matchen deze run. Zonder
            # dit kan een silently-mislukte rsync naar DIST groene runs
            # opleveren terwijl prod oude content blijft serveren.
            printf '{"sha":"%s","runId":"%s","runNumber":"%s","builtAt":"%s"}\n' \
              "$GIT_SHA" "$RUN_ID" "$RUN_NUMBER" "$(date -u +%FT%TZ)" \
              > dist/build-info.json
            echo "dist/build-info.json:"
            cat dist/build-info.json
            ls -la dist/
        run: |
          printf '%s\n' "$BUILD_SCRIPT" \
            | ssh "$VPS" "STAGE='$STAGE' GIT_SHA='$GIT_SHA' RUN_ID='$RUN_ID' RUN_NUMBER='$RUN_NUMBER' bash -s"

      # ── 7. Sync inhoud + config naar DIST + container reload ─────────────
      #
      # BELANGRIJK: we mogen DIST zelf niet hernoemen of vervangen, want de
      # nginx-container heeft hem via bind-mount aan een vaste inode hangen.
      # `mv` zou de container losrukken van zijn mount → 500.
      #
      # Daarom: rsync overschrijft de inhoud van DIST in-place. De inode
      # blijft gelijk, de mount blijft geldig. Als rollback maken we eerst
      # een hardlink-snapshot (kost ~0 schijfruimte).
      #
      # Config-files (nginx, htpasswd, docker-compose) worden ook gesynct
      # vanuit staging naar /root/vinomartino-site/ zodat repo en VPS in
      # sync blijven. nginx -t valideert de config vóór reload; bij falen
      # worden config-files teruggerold.
      - name: Sync to DIST + config + reload
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          STAGE: /srv/vino-builds/${{ github.run_id }}
          DIST: ${{ steps.env.outputs.dist_dir }}
          CONTAINER: ${{ steps.env.outputs.container }}
          SWAP_SCRIPT: |
            set -euo pipefail
            SITE_ROOT="/root/vinomartino-site"
            mkdir -p "$DIST"

            # Hardlink-snapshot voor rollback (cp -al, geen disk-overhead)
            BACKUP="${DIST}.old-$(date +%s)"
            cp -al "$DIST" "$BACKUP" 2>/dev/null || cp -a "$DIST" "$BACKUP"

            # Inhoud overschrijven, DIST-directory zelf raken we niet aan
            # LAT-910: itemize-changes zodat we in de GHA-log kunnen zien
            # dat rsync daadwerkelijk bestanden heeft gekopieerd. Stats
            # voor explicit copy-count.
            rsync -a --delete --stats --itemize-changes "$STAGE/dist/" "$DIST/" \
              | tail -n 30
            echo "DIST inhoud na rsync:"
            ls -la "$DIST/" | head -20
            if [ -f "$DIST/build-info.json" ]; then
              echo "DIST/build-info.json:"
              cat "$DIST/build-info.json"
            else
              echo "::error::build-info.json ontbreekt in DIST na rsync — build heeft hem niet geschreven"
              exit 1
            fi

            # Config-files syncen naar site-root (LAT-779)
            CONFIG_FILES="nginx-prod.conf nginx-preview.conf htpasswd docker-compose.vinomartino-prod.yml docker-compose.vinomartino-preview.yml"
            for f in $CONFIG_FILES; do
              if [ -f "$STAGE/$f" ]; then
                [ -f "$SITE_ROOT/$f" ] && cp "$SITE_ROOT/$f" "$SITE_ROOT/$f.bak"
                cp "$STAGE/$f" "$SITE_ROOT/$f"
              fi
            done

            # Valideer nginx config vóór reload
            if ! docker exec "$CONTAINER" nginx -t 2>&1; then
              echo "::error::nginx -t failed — config rollback"
              for f in $CONFIG_FILES; do
                [ -f "$SITE_ROOT/$f.bak" ] && mv "$SITE_ROOT/$f.bak" "$SITE_ROOT/$f"
              done
              exit 1
            fi

            # Opruimen .bak files na geslaagde validatie
            for f in $CONFIG_FILES; do
              rm -f "$SITE_ROOT/$f.bak"
            done

            # Stage opruimen
            rm -rf "$STAGE"

            # Houd alleen de laatste 3 backups
            ls -1dt "${DIST}".old-* 2>/dev/null | tail -n +4 | xargs -r rm -rf

            # nginx hot reload — container bind-mount blijft geldig
            docker exec "$CONTAINER" nginx -s reload \
              || docker restart "$CONTAINER"
        run: |
          printf '%s\n' "$SWAP_SCRIPT" \
            | ssh "$VPS" "DIST='$DIST' STAGE='$STAGE' CONTAINER='$CONTAINER' bash -s"

      # ── 7b. Drift check: live container vs compose spec ──────────────────
      #
      # LAT-914: tijdens LAT-909 incident bleek `paperclip-vinomartino-prod-1`
      # te draaien vanuit een self-baked image (geen bind-mounts) terwijl
      # docker-compose.vinomartino-prod.yml bind-mounts beschrijft. De rsync+
      # nginx-reload flow werkt dan stilletjes mis: dist/ wordt geüpdatet maar
      # de container serveert nog uit baked content. Smoke-test (LAT-910)
      # ving het uiteindelijk via SHA-mismatch, maar pas nadat content al uren
      # stale was.
      #
      # Deze step verifieert dat de live container matcht met de spec uit
      # docker-compose.vinomartino-prod.yml (image, mounts, network, traefik
      # labels, restart policy). Bij drift: snapshot + auto-reconcile via
      # `docker compose up -d --force-recreate --no-deps`. Alleen voor
      # productie — preview heeft geen SLA en geen externe traffic.
      #
      # Runbook voor handmatige recovery: docs/runbooks/vinomartino-prod-recreate.md
      - name: Verify prod container matches compose spec (LAT-914)
        if: steps.env.outputs.target == 'production'
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          CONTAINER: ${{ steps.env.outputs.container }}
          DRIFT_SCRIPT: |
            set -euo pipefail
            cd /root/vinomartino-site

            COMPOSE_FILE="docker-compose.vinomartino-prod.yml"
            SERVICE="vinomartino-prod"
            EXPECTED_IMAGE="nginx:alpine"
            EXPECTED_NETWORK="paperclip_default"
            EXPECTED_RESTART="unless-stopped"
            EXPECTED_BINDS=$(cat <<EOF
            /root/vinomartino-site/dist:/usr/share/nginx/html:ro
            /root/vinomartino-site/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
            EOF
            )
            EXPECTED_LABELS=$(cat <<'EOF'
            traefik.enable=true
            traefik.http.routers.vinomartino.entrypoints=websecure
            traefik.http.routers.vinomartino.rule=Host(`vinomartino.com`) || Host(`www.vinomartino.com`)
            traefik.http.routers.vinomartino.tls.certresolver=letsencrypt
            traefik.http.services.vinomartino.loadbalancer.server.port=80
            EOF
            )

            inspect_drift() {
              local drift=()
              if ! docker inspect "$CONTAINER" >/dev/null 2>&1; then
                echo "container_missing"
                return 0
              fi

              local actual_image
              actual_image=$(docker inspect "$CONTAINER" --format '{{.Config.Image}}')
              [ "$actual_image" = "$EXPECTED_IMAGE" ] || drift+=("image=$actual_image (verwacht $EXPECTED_IMAGE)")

              local actual_binds
              actual_binds=$(docker inspect "$CONTAINER" --format '{{range .Mounts}}{{if eq .Type "bind"}}{{.Source}}:{{.Destination}}:{{if .RW}}rw{{else}}ro{{end}}{{"\n"}}{{end}}{{end}}' | sed '/^$/d' | sort)
              local expected_sorted
              expected_sorted=$(printf '%s\n' "$EXPECTED_BINDS" | sed '/^$/d' | sort)
              if [ "$actual_binds" != "$expected_sorted" ]; then
                drift+=("binds mismatch")
                drift+=("  actual:")
                while IFS= read -r line; do [ -n "$line" ] && drift+=("    $line"); done <<<"$actual_binds"
                drift+=("  expected:")
                while IFS= read -r line; do [ -n "$line" ] && drift+=("    $line"); done <<<"$expected_sorted"
              fi

              if ! docker inspect "$CONTAINER" --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}' | grep -qx "$EXPECTED_NETWORK"; then
                drift+=("network ontbreekt: $EXPECTED_NETWORK")
              fi

              local actual_labels
              actual_labels=$(docker inspect "$CONTAINER" --format '{{range $k,$v := .Config.Labels}}{{$k}}={{$v}}{{"\n"}}{{end}}')
              while IFS= read -r label; do
                [ -z "$label" ] && continue
                if ! grep -Fxq "$label" <<<"$actual_labels"; then
                  drift+=("label ontbreekt: $label")
                fi
              done <<<"$EXPECTED_LABELS"

              local rp
              rp=$(docker inspect "$CONTAINER" --format '{{.HostConfig.RestartPolicy.Name}}')
              [ "$rp" = "$EXPECTED_RESTART" ] || drift+=("restart=$rp (verwacht $EXPECTED_RESTART)")

              if [ ${#drift[@]} -eq 0 ]; then
                echo "ok"
              else
                printf '%s\n' "${drift[@]}"
              fi
            }

            result=$(inspect_drift)

            if [ "$result" = "ok" ]; then
              echo "::notice::Container $CONTAINER in sync met $COMPOSE_FILE"
              exit 0
            fi

            if [ "$result" = "container_missing" ]; then
              echo "::warning::Container $CONTAINER bestaat niet — recreate via compose"
            else
              echo "::warning::Drift gedetecteerd voor $CONTAINER vs $COMPOSE_FILE:"
              echo "$result" | sed 's/^/  /'
              SNAPSHOT="/tmp/prod-rollback-$(date +%s).json"
              docker inspect "$CONTAINER" > "$SNAPSHOT" 2>/dev/null \
                && echo "::notice::Pre-reconcile spec snapshot → $SNAPSHOT (rollback-bewijs)"
            fi

            echo "::notice::Reconcile: docker compose -f $COMPOSE_FILE up -d --force-recreate --no-deps $SERVICE"
            docker compose -f "$COMPOSE_FILE" up -d --force-recreate --no-deps "$SERVICE"

            sleep 3
            recheck=$(inspect_drift)
            if [ "$recheck" = "ok" ]; then
              echo "::notice::Drift opgelost — container nu in sync met compose"
              exit 0
            fi

            echo "::error::Reconcile gefaald — drift na force-recreate:"
            echo "$recheck" | sed 's/^/  /'
            echo "::error::Volg docs/runbooks/vinomartino-prod-recreate.md voor handmatige recovery"
            exit 1
        run: |
          printf '%s\n' "$DRIFT_SCRIPT" \
            | ssh "$VPS" "CONTAINER='$CONTAINER' bash -s"

      # ── 8. Smoke test ────────────────────────────────────────────────────
      # Retry-loop omdat nginx een paar seconden nodig heeft om warm te zijn
      # na de reload. Eerste request kan transient 500/502 geven.
      #
      # LAT-910: voor productie checken we /build-info.json zodat we
      # garanderen dat de net-gepushte SHA daadwerkelijk geserveerd wordt.
      # Het oude `/vinomartino/nl/` smoke-pad volgde 301 → / via -L en gaf
      # daardoor altijd 200, óók als rsync-naar-DIST silently mislukte.
      - name: Smoke test
        env:
          GIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ "${{ steps.env.outputs.target }}" = "production" ]; then
            URL="https://vinomartino.com/?cb=${RUN_ID}"
            INFO_URL="https://vinomartino.com/build-info.json?cb=${RUN_ID}"
          else
            URL="https://preview.vinomartino.com/?cb=${RUN_ID}"
            INFO_URL="https://preview.vinomartino.com/build-info.json?cb=${RUN_ID}"
            # Preview zit achter CF Access; 302 of 200 is OK
          fi

          code="000"
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H 'Cache-Control: no-cache' --max-time 15 "$URL" || echo "000")
            echo "Attempt $attempt: GET $URL → HTTP $code"
            if [ "$code" = "200" ]; then break; fi
            sleep 4
          done

          if [ "${{ steps.env.outputs.target }}" = "production" ]; then
            [ "$code" = "200" ] || { echo "::error::Productie smoke-test faalde na 5 pogingen ($code)"; exit 1; }

            # Verifieer dat productie de net-gebouwde SHA serveert. We doen
            # dit via een cache-buster query + no-cache header zodat een
            # eventuele Cloudflare-edge-cache het resultaat niet vertroebelt.
            served_sha=""
            for attempt in 1 2 3 4 5; do
              served_sha=$(curl -fsS --max-time 10 \
                -H 'Cache-Control: no-cache' \
                "$INFO_URL" 2>/dev/null \
                | python3 -c 'import json,sys;print(json.load(sys.stdin).get("sha",""))' 2>/dev/null \
                || echo "")
              echo "Attempt $attempt: build-info.sha = '$served_sha' (verwacht: $GIT_SHA)"
              if [ "$served_sha" = "$GIT_SHA" ]; then break; fi
              sleep 4
            done

            if [ "$served_sha" != "$GIT_SHA" ]; then
              echo "::error::Productie serveert SHA '$served_sha' maar workflow draait '$GIT_SHA' — rsync naar DIST is mislukt of CDN cachet stale content (LAT-910)"
              echo "INFO_URL: $INFO_URL"
              curl -sS --max-time 10 -H 'Cache-Control: no-cache' "$INFO_URL" || true
              exit 1
            fi
            echo "::notice::Smoke-test OK — productie serveert correcte build $served_sha"
          fi

      - name: Done
        run: echo "::notice::Deploy naar ${{ steps.env.outputs.target }} voltooid (${{ github.sha }})"
