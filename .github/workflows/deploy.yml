# LAT-89 — auto-deploy pipeline voor vinomartino-site
#
# Architectuur: VPS-side build.
#   1. GHA checkt code uit
#   2. GHA rsynct src (zonder node_modules/dist) naar /srv/vino-builds/<sha>/
#   3. VPS bouwt daar (npm ci + npm run build) — heeft direct toegang tot
#      Directus binnen het Docker-netwerk, geen CF Access secrets in GHA nodig
#   4. Atomic swap: nieuwe dist/ wordt verplaatst naar definitieve locatie,
#      oude wordt bewaard als .old-<ts> (laatste 3 als rollback)
#   5. nginx reload in de juiste container
#
# Branches:
#   • preview → /root/vinomartino-site/preview-dist (paperclip-vinomartino-preview-1)
#   • main    → /root/vinomartino-site/dist          (paperclip-vinomartino-site-1)
#             → eerst Telegram-approval via Paperclip CoS bridge
#
# Vereiste secrets (slechts 3):
#   VPS_HOST, VPS_USER, VPS_SSH_PRIVATE_KEY
#
# Optioneel:
#   COS_APPROVAL_URL  (default: https://approval.vinomartino.com/approval)

name: Deploy VinoMartino

on:
  push:
    branches: [preview, main]
  workflow_dispatch:
    inputs:
      target:
        description: "Doel (preview of production)"
        required: true
        default: preview
        type: choice
        options: [preview, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Bepaal doel-omgeving ──────────────────────────────────────────
      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.target }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            target="production"
          else
            target="preview"
          fi

          if [ "$target" = "production" ]; then
            dist_dir="/root/vinomartino-site/dist"
            container="paperclip-vinomartino-site-1"
          else
            dist_dir="/root/vinomartino-site/preview-dist"
            container="paperclip-vinomartino-preview-1"
          fi

          echo "target=$target"       >> "$GITHUB_OUTPUT"
          echo "dist_dir=$dist_dir"   >> "$GITHUB_OUTPUT"
          echo "container=$container" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploying to $target → $dist_dir ($container)"

      # ── 2. Productie-gate: vraag Telegram-approval via CoS bridge ────────
      - name: Request production approval (Telegram)
        if: steps.env.outputs.target == 'production'
        env:
          APPROVAL_URL: ${{ secrets.COS_APPROVAL_URL || 'https://approval.vinomartino.com/approval' }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          payload=$(jq -n \
            --arg title "Productie-deploy VinoMartino — ${SHA:0:7}" \
            --arg desc  "Auteur: $AUTHOR%0ACommit: $COMMIT_MSG%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              title:           $title,
              description:     $desc,
              urgency:         "normal",
              timeout_seconds: 86400,
              source:          "github-actions",
              ref:             "${{ github.sha }}"
            }')

          response=$(curl -sS --max-time 86400 -X POST "$APPROVAL_URL" \
            -H "Content-Type: application/json" -d "$payload")

          decision=$(echo "$response" | jq -r '.decision // "unknown"')
          if [ "$decision" != "approved" ]; then
            echo "::error::Productie-deploy geweigerd of getimeout (decision=$decision)"
            exit 1
          fi
          echo "::notice::Productie-deploy goedgekeurd door Marijn op Telegram"

      # ── 3. Code ophalen ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 4. SSH-key in agent ──────────────────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # ── 5. Sync src naar VPS staging ─────────────────────────────────────
      - name: Sync source to VPS staging
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          STAGE: /srv/vino-builds/${{ github.sha }}
        run: |
          ssh "$VPS" "mkdir -p '$STAGE'"
          rsync -avz --delete \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=preview-dist \
            --exclude=.git \
            --exclude='*.old-*' \
            --exclude='deploy-key-github-actions*' \
            ./ "$VPS:$STAGE/"

      # ── 6. Build op VPS ──────────────────────────────────────────────────
      #
      # We kopiëren .env uit de bestaande site-folder zodat DIRECTUS_URL en
      # DIRECTUS_TOKEN beschikbaar zijn tijdens de build. Geen secrets nodig
      # in GHA — Directus zit achter CF Access en is alleen vanaf de VPS
      # bereikbaar via het Docker-netwerk. Script wordt via stdin verstuurd
      # zodat we geen bash heredoc binnen YAML hoeven te jongleren.
      - name: Build on VPS
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          STAGE: /srv/vino-builds/${{ github.sha }}
          BUILD_SCRIPT: |
            set -euo pipefail
            cd "$STAGE"
            if [ -f /root/vinomartino-site/.env ]; then
              cp /root/vinomartino-site/.env .env
            fi
            if command -v npm >/dev/null 2>&1; then
              npm ci
              npm run build
            else
              docker run --rm --network host \
                -v "$STAGE":/app -w /app \
                node:24 bash -c "npm ci && npm run build"
            fi
            ls -la dist/
        run: |
          printf '%s\n' "$BUILD_SCRIPT" | ssh "$VPS" "STAGE='$STAGE' bash -s"

      # ── 7. Atomic swap + container reload ────────────────────────────────
      - name: Atomic swap + reload
        env:
          VPS: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          STAGE: /srv/vino-builds/${{ github.sha }}
          DIST: ${{ steps.env.outputs.dist_dir }}
          CONTAINER: ${{ steps.env.outputs.container }}
          SWAP_SCRIPT: |
            set -euo pipefail
            BACKUP="${DIST}.old-$(date +%s)"
            if [ -d "$DIST" ]; then
              mv "$DIST" "$BACKUP"
            fi
            mv "$STAGE/dist" "$DIST"
            rm -rf "$STAGE"
            ls -1dt "${DIST}".old-* 2>/dev/null | tail -n +4 | xargs -r rm -rf
            docker exec "$CONTAINER" nginx -s reload \
              || docker restart "$CONTAINER"
        run: |
          printf '%s\n' "$SWAP_SCRIPT" \
            | ssh "$VPS" "DIST='$DIST' STAGE='$STAGE' CONTAINER='$CONTAINER' bash -s"

      # ── 8. Smoke test ────────────────────────────────────────────────────
      - name: Smoke test
        run: |
          if [ "${{ steps.env.outputs.target }}" = "production" ]; then
            URL="https://vinomartino.com/nl/"
          else
            URL="https://preview.vinomartino.com/nl/"
            # Preview zit achter CF Access; 302 of 200 is OK
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" -L --max-time 15 "$URL" || echo "000")
          echo "GET $URL → HTTP $code"
          if [ "${{ steps.env.outputs.target }}" = "production" ]; then
            [ "$code" = "200" ] || { echo "::error::Productie smoke-test faalde ($code)"; exit 1; }
          fi

      - name: Done
        run: echo "::notice::Deploy naar ${{ steps.env.outputs.target }} voltooid (${{ github.sha }})"
