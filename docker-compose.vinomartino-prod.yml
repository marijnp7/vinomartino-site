services:
  vinomartino-prod:
    image: paperclip-site:latest
    build:
      context: .
      dockerfile: Dockerfile
      network: paperclip_default
      args:
        DIRECTUS_URL: ${DIRECTUS_URL:-http://vinomartino-directus-1:8055}
        DIRECTUS_TOKEN: ${DIRECTUS_TOKEN:-}
        CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
        CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
        BOOKING_AID: ${BOOKING_AID:-}
        GETYOURGUIDE_PARTNER: ${GETYOURGUIDE_PARTNER:-}
        WIJNVOORDEEL_TRACKING_ID: ${WIJNVOORDEEL_TRACKING_ID:-}
        SKYSCANNER_PARTNER: ${SKYSCANNER_PARTNER:-}
        REISVERZEKERING_PARTNER: ${REISVERZEKERING_PARTNER:-}
    container_name: paperclip-vinomartino-prod-1
    restart: unless-stopped
    volumes:
      - ./nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 128m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vinomartino.entrypoints=websecure"
      - "traefik.http.routers.vinomartino.rule=Host(`vinomartino.com`) || Host(`www.vinomartino.com`)"
      - "traefik.http.routers.vinomartino.tls.certresolver=letsencrypt"
      - "traefik.http.services.vinomartino.loadbalancer.server.port=80"
    networks:
      - paperclip_default

networks:
  paperclip_default:
    external: true
    name: paperclip_default
