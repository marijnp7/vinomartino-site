<?xml version="1.0" encoding="UTF-8"?>
<!--
  VinoMartino · Infographic spritesheet
  Symbols only. Reference with <svg><use href="/assets/vm-infographic-sprites.svg#sym-id"/></svg>.
  All symbols use stroke="currentColor" / fill="currentColor" so a parent CSS color rules them.
  Stroke widths assume rendered size 24px unless noted. Markers and ornaments scale freely.

  Token color reminders (set via parent color):
    burgundy #5A1A1F  — regio · zone
    rust     #A14F2A  — druif · element
    vine     #5C6B3F  — klimaat · vegetatie · water
    gold     #E5C99B  — aroma · accent
    ink      #1F1A16  — markers · puntdata
-->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <style>
      symbol { overflow: visible; }
    </style>

    <!--
      ────────────────────────────────────────────────────────
      § 1.  ICONS · 24×24 grid · stroke-width 1.2
      ────────────────────────────────────────────────────────
    -->

    <symbol id="sym-grape" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3 L12 6 M9 4 Q11 5 12 6"/>
        <circle cx="12" cy="9" r="2.2"/>
        <circle cx="9"  cy="11" r="2.2"/>
        <circle cx="15" cy="11" r="2.2"/>
        <circle cx="10.5" cy="14.5" r="2.2"/>
        <circle cx="13.5" cy="14.5" r="2.2"/>
        <circle cx="12" cy="18" r="2.2"/>
      </g>
    </symbol>

    <symbol id="sym-bottle" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.5 2 H13.5 V5.5 C13.5 7 15 8 15 11 V20 Q15 21.5 13.5 21.5 H10.5 Q9 21.5 9 20 V11 C9 8 10.5 7 10.5 5.5 Z"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
      </g>
    </symbol>

    <symbol id="sym-glass" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 3 H17 L15.5 11 Q15 14 12 14 Q9 14 8.5 11 Z"/>
        <line x1="12" y1="14" x2="12" y2="20"/>
        <line x1="9"  y1="20.5" x2="15" y2="20.5"/>
      </g>
    </symbol>

    <symbol id="sym-barrel" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="12" rx="9" ry="6.5"/>
        <path d="M3.4 10 H20.6 M3.4 14 H20.6"/>
        <path d="M7 5.9 V18.1 M12 5.5 V18.5 M17 5.9 V18.1"/>
      </g>
    </symbol>

    <symbol id="sym-vineyard" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 20 Q7 14 12 16 Q17 18 22 13"/>
        <path d="M2 22 H22"/>
        <line x1="6"  y1="15" x2="6"  y2="20"/>
        <line x1="10" y1="15.3" x2="10" y2="20"/>
        <line x1="14" y1="16.8" x2="14" y2="20"/>
        <line x1="18" y1="14.8" x2="18" y2="20"/>
      </g>
    </symbol>

    <symbol id="sym-mountain" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 20 L9 9 L13.5 15 L17 11 L22 20 Z"/>
        <path d="M7.5 11.2 L9 9 L10.5 11.2"/>
      </g>
    </symbol>

    <symbol id="sym-volcano" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 21 L8 9 H16 L22 21 Z"/>
        <path d="M9 9 Q10 6 9.5 4 M12 9 Q13 5 11.5 2 M14.5 9 Q15.5 6 15 4"/>
      </g>
    </symbol>

    <symbol id="sym-river" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 7  Q7 4  12 7  T22 7"/>
        <path d="M2 12 Q7 9  12 12 T22 12"/>
        <path d="M2 17 Q7 14 12 17 T22 17"/>
      </g>
    </symbol>

    <symbol id="sym-sun" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2 V5 M12 19 V22 M2 12 H5 M19 12 H22 M4.9 4.9 L7 7 M17 17 L19.1 19.1 M19.1 4.9 L17 7 M7 17 L4.9 19.1"/>
      </g>
    </symbol>

    <symbol id="sym-thermo" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3 Q14.5 3 14.5 5.5 V13.8 Q16 15 16 17 Q16 19.5 12 19.5 Q8 19.5 8 17 Q8 15 9.5 13.8 V5.5 Q9.5 3 12 3 Z"/>
        <circle cx="12" cy="17" r="1.6" fill="currentColor"/>
        <line x1="12" y1="6" x2="12" y2="13"/>
      </g>
    </symbol>

    <symbol id="sym-droplet" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3 Q18 11 18 15 Q18 20 12 20 Q6 20 6 15 Q6 11 12 3 Z"/>
        <path d="M10 14 Q11 16 13 16"/>
      </g>
    </symbol>

    <symbol id="sym-leaf" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 20 Q4 8 20 4 Q20 16 8 20 Z"/>
        <path d="M4 20 L20 4"/>
      </g>
    </symbol>

    <symbol id="sym-cellar" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 21 V10 Q12 3 21 10 V21 Z"/>
        <path d="M9 21 V14 Q12 12 15 14 V21"/>
        <circle cx="12" cy="14.5" r="0.8" fill="currentColor"/>
      </g>
    </symbol>

    <symbol id="sym-route" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 3 Q3 6 5 9 Q8 11 11 12 Q14 13 15 16 Q17 19 14 21"
              stroke-dasharray="2 2"/>
        <circle cx="5"  cy="3"  r="1.6" fill="currentColor"/>
        <circle cx="14" cy="21" r="1.6" fill="currentColor"/>
      </g>
    </symbol>

    <symbol id="sym-train" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="3" width="14" height="14" rx="2"/>
        <line x1="5" y1="10" x2="19" y2="10"/>
        <circle cx="8.5"  cy="13.5" r="0.9" fill="currentColor"/>
        <circle cx="15.5" cy="13.5" r="0.9" fill="currentColor"/>
        <path d="M7 17 L4 21 M17 17 L20 21"/>
      </g>
    </symbol>

    <symbol id="sym-fork" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 3 V10 Q7 11.5 8.5 11.5 H9.5 V21"/>
        <path d="M9.5 3 V8.5"/>
        <path d="M16 3 Q14 4 14 8 Q14 10.5 16 11.5 V21"/>
      </g>
    </symbol>

    <symbol id="sym-clock" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 7 V12 L15.5 14"/>
      </g>
    </symbol>

    <symbol id="sym-calendar" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="16" rx="1.5"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="3" x2="8" y2="7"/>
        <line x1="16" y1="3" x2="16" y2="7"/>
      </g>
    </symbol>

    <symbol id="sym-info" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="11" x2="12" y2="16.5"/>
        <circle cx="12" cy="7.8" r="0.9" fill="currentColor" stroke="none"/>
      </g>
    </symbol>

    <symbol id="sym-source" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 3 H15 L19 7 V21 H5 Z"/>
        <path d="M15 3 V7 H19"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
        <line x1="8" y1="15.5" x2="14" y2="15.5"/>
      </g>
    </symbol>

    <!--
      ────────────────────────────────────────────────────────
      § 2.  MAP MARKERS · 20×20 with anchor point at bottom
            Anchor convention: tip at (10, 20) for pin shapes,
            center at (10,10) for dot/ring shapes.
      ────────────────────────────────────────────────────────
    -->

    <symbol id="mark-pin-solid" viewBox="0 0 20 20">
      <path d="M10 0 Q4 0 4 6 Q4 11 10 20 Q16 11 16 6 Q16 0 10 0 Z"
            fill="currentColor"/>
      <circle cx="10" cy="6.5" r="2" fill="#FAF5E9"/>
    </symbol>

    <symbol id="mark-pin-outline" viewBox="0 0 20 20">
      <path d="M10 0 Q4 0 4 6 Q4 11 10 20 Q16 11 16 6 Q16 0 10 0 Z"
            fill="#FAF5E9" stroke="currentColor" stroke-width="1.2"/>
      <circle cx="10" cy="6.5" r="2" fill="currentColor"/>
    </symbol>

    <symbol id="mark-village" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="3" fill="currentColor"/>
      <circle cx="10" cy="10" r="5.5" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.6"/>
    </symbol>

    <symbol id="mark-city" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="4" fill="#FAF5E9" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="10" cy="10" r="1.3" fill="currentColor"/>
    </symbol>

    <symbol id="mark-winery" viewBox="0 0 20 20">
      <rect x="3.5" y="3.5" width="13" height="13" fill="#FAF5E9" stroke="currentColor" stroke-width="1.2" transform="rotate(45 10 10)"/>
      <circle cx="10" cy="10" r="1.4" fill="currentColor"/>
    </symbol>

    <symbol id="mark-summit" viewBox="0 0 20 20">
      <path d="M10 2 L18 16 H2 Z" fill="#FAF5E9" stroke="currentColor" stroke-width="1.2"/>
      <path d="M7.5 11 L10 7 L12.5 11" fill="none" stroke="currentColor" stroke-width="1"/>
    </symbol>

    <symbol id="mark-stop-num" viewBox="0 0 20 20">
      <!--
        Numbered route stop. The number itself is added by the consumer:
        <use href="#mark-stop-num"/>
        <text x="10" y="13" text-anchor="middle"
              font-family="'JetBrains Mono'" font-size="10" fill="currentColor">3</text>
      -->
      <circle cx="10" cy="10" r="8.5" fill="#FAF5E9" stroke="currentColor" stroke-width="1.2"/>
    </symbol>

    <!--
      ────────────────────────────────────────────────────────
      § 3.  ORNAMENTS · scale to fit
      ────────────────────────────────────────────────────────
    -->

    <symbol id="orn-rule-dot" viewBox="0 0 120 12">
      <line x1="0" y1="6" x2="50" y2="6" stroke="currentColor" stroke-width="1.4"/>
      <line x1="70" y1="6" x2="120" y2="6" stroke="currentColor" stroke-width="1.4"/>
      <circle cx="60" cy="6" r="2.8" fill="currentColor"/>
    </symbol>

    <symbol id="orn-rule-diamond" viewBox="0 0 120 14">
      <line x1="0" y1="7" x2="48" y2="7" stroke="currentColor" stroke-width="1.4"/>
      <line x1="72" y1="7" x2="120" y2="7" stroke="currentColor" stroke-width="1.4"/>
      <path d="M60 1 L66 7 L60 13 L54 7 Z" fill="currentColor"/>
    </symbol>

    <symbol id="orn-rule-thin" viewBox="0 0 120 2">
      <line x1="0" y1="1" x2="120" y2="1" stroke="currentColor" stroke-width="0.6"/>
    </symbol>

    <symbol id="orn-section" viewBox="0 0 60 24">
      <text x="0" y="16" font-family="'JetBrains Mono', ui-monospace, monospace"
            font-size="11" letter-spacing="0.18em" fill="currentColor">§ 01</text>
    </symbol>

    <symbol id="orn-compass" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="26" fill="none" stroke="currentColor" stroke-width="0.6"/>
      <line x1="30" y1="6" x2="30" y2="54" stroke="currentColor" stroke-width="0.6"/>
      <line x1="6" y1="30" x2="54" y2="30" stroke="currentColor" stroke-width="0.6"/>
      <path d="M30 6 L33 30 L30 54 L27 30 Z" fill="currentColor"/>
      <text x="30" y="2" font-family="'JetBrains Mono', ui-monospace, monospace"
            font-size="9" text-anchor="middle" fill="currentColor">N</text>
    </symbol>

    <symbol id="orn-scale-bar" viewBox="0 0 120 18">
      <!-- 0 / 5 / 10 km tick scale bar -->
      <line x1="6" y1="10" x2="114" y2="10" stroke="currentColor" stroke-width="0.6"/>
      <line x1="6"  y1="6" x2="6"  y2="14" stroke="currentColor" stroke-width="0.6"/>
      <line x1="60" y1="6" x2="60" y2="14" stroke="currentColor" stroke-width="0.6"/>
      <line x1="114" y1="6" x2="114" y2="14" stroke="currentColor" stroke-width="0.6"/>
      <text x="6"   y="4" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" fill="currentColor">0</text>
      <text x="60"  y="4" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" text-anchor="middle" fill="currentColor">5</text>
      <text x="114" y="4" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" text-anchor="end" fill="currentColor">10 km</text>
    </symbol>

    <symbol id="orn-drop-cap-frame" viewBox="0 0 60 60">
      <!-- subtle inset frame for §-section drop-cap blocks -->
      <rect x="1" y="1" width="58" height="58" fill="none" stroke="currentColor" stroke-width="0.6"/>
    </symbol>

    <symbol id="orn-corner-tick" viewBox="0 0 24 24">
      <path d="M0 6 V0 H6 M18 0 H24 V6 M24 18 V24 H18 M6 24 H0 V18"
            fill="none" stroke="currentColor" stroke-width="0.8"/>
    </symbol>

    <!--
      ────────────────────────────────────────────────────────
      § 4.  PATTERNS · for atlas background fills
            Reference with fill="url(/path/to/sprites.svg#pat-contour)"
            (inline preferred — see component spec).
      ────────────────────────────────────────────────────────
    -->

    <pattern id="pat-contour" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M0,7 Q3.5,4 7,7 T14,7" stroke="#C9B98F" stroke-width="0.4" fill="none" opacity="0.55"/>
    </pattern>

    <pattern id="pat-vine-rows" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <line x1="0" y1="14" x2="18" y2="14" stroke="#C9B98F" stroke-width="0.3" opacity="0.5"/>
      <line x1="2" y1="14" x2="2" y2="9" stroke="#C9B98F" stroke-width="0.3" opacity="0.5"/>
      <line x1="8" y1="14" x2="8" y2="9" stroke="#C9B98F" stroke-width="0.3" opacity="0.5"/>
      <line x1="14" y1="14" x2="14" y2="9" stroke="#C9B98F" stroke-width="0.3" opacity="0.5"/>
    </pattern>

    <pattern id="pat-hatch" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse"
             patternTransform="rotate(-30)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#C9B98F" stroke-width="0.4" opacity="0.55"/>
    </pattern>
  </defs>
</svg>
