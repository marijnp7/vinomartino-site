server {
    listen 80;
    server_name vinomartino.travel preview.vinomartino.com;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    # LAT-1112: preview serveert draft-content; nooit indexeerbaar.
    # `always` is verplicht zodat de header ook op 404/redirect/error-paden
    # gezet wordt, niet alleen op 2xx.
    add_header X-Robots-Tag "noindex, nofollow" always;

    error_page 404 /404.html;

    location ~* /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # LAT-799 legacy multi-brand redirects: bookmarks/index entries → /
    location ~ ^/vinomartino(/.*)?$ {
        return 301 /$is_args$args;
    }
    location ~ ^/nl(/.*)?$ {
        return 301 /$is_args$args;
    }
    location ~ ^/bestemmingen(/.*)?$ {
        return 301 /$is_args$args;
    }

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }
}
