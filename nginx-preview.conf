server {
    listen 80;
    server_name vinomartino.travel preview.vinomartino.com;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    # LAT-1112: preview serveert draft-content; nooit indexeerbaar.
    # `always` is verplicht zodat de header ook op 404/redirect/error-paden
    # gezet wordt, niet alleen op 2xx.
    add_header X-Robots-Tag "noindex, nofollow" always;

    error_page 404 /404.html;

    location ~* /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # LAT-799 legacy multi-brand redirects: bookmarks/index entries → /
    location ~ ^/vinomartino(/.*)?$ {
        return 301 /$is_args$args;
    }
    location ~ ^/nl(/.*)?$ {
        return 301 /$is_args$args;
    }
    location ~ ^/bestemmingen(/.*)?$ {
        return 301 /$is_args$args;
    }

    # LAT-2665: legacy blog/regio URLs 404 in GSC; content moved to /streken/*.
    location ~ ^/blog/sardinie-voor-de-rest-cannonau-old-vines/?$ {
        return 301 /streken/sardegna-italie/;
    }
    location ~ ^/regio/mosel-duitsland/?$ {
        return 301 /streken/mosel-duitsland/;
    }

    # LAT-2769: persona-auteurspagina's 301 naar /over-ons/ (pariteit met
    # nginx-prod.conf zodat de redirect op preview te verifieren is).
    # marijn en de index-pagina's blijven bewust buiten de alternatie.
    location ~ ^/en/auteurs/(charly|hugo|lea|mira|robin|sophie|tomas)/?$ {
        return 301 /en/over-ons/;
    }
    location ~ ^/auteurs/(charly|hugo|lea|mira|robin|sophie|tomas)/?$ {
        return 301 /over-ons/;
    }

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }
}
