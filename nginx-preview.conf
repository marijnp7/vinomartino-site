server {
    listen 80;
    server_name vinomartino.travel preview.vinomartino.com;

    root /usr/share/nginx/html;
    index index.html;

    # Root → V3 VinoMartino-NL homepage
    location = / {
        return 302 /vinomartino/nl/;
    }

    location ~* /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }
}
